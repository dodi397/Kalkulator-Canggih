<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartCalc Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script>
    window.CURRENCY_RATES = {{ currency_rates | tojson }};
    window.BASES = {{ bases | tojson }};
    window.TEMP_UNITS = {{ temp_units | tojson }};
  </script>
</head>
<body class="theme-light">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-card">
        <div class="brand-icon"><i class="bi bi-calculator-fill"></i></div>
        <div>
          <h1>SmartCalc Pro</h1>
          <p>Kalkulator Canggih All-in-One</p>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Menu Utama</div>
        <button class="menu-item active" data-tab="tab-arithmetic">
          <i class="bi bi-plus-slash-minus"></i>
          <span>Aritmatika</span>
        </button>
        <button class="menu-item" data-tab="tab-logic">
          <i class="bi bi-diagram-3"></i>
          <span>Logika</span>
        </button>
        <button class="menu-item" data-tab="tab-transform">
          <i class="bi bi-arrow-left-right"></i>
          <span>Transformasi Bilangan</span>
        </button>
        <button class="menu-item" data-tab="tab-bonus">
          <i class="bi bi-stars"></i>
          <span>Faktorial & Fibonacci</span>
        </button>
        <button class="menu-item" data-tab="tab-history">
          <i class="bi bi-clock-history"></i>
          <span>History</span>
        </button>
      </div>

      <div class="sidebar-footer">
          <div class="d-flex align-items-center gap-2 mb-2">
        </div>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div>
          <div class="greeting">Selamat datang kembali! 👋</div>
          <div class="subgreeting">Hitung lebih cepat, tepat, dan cerdas.</div>
        </div>
        <div class="topbar-actions">
          <button id="themeToggle" class="action-btn" type="button">
            <i class="bi bi-sun-fill me-2"></i>
            <span id="themeText">Light Mode</span>
          </button>
          <button class="action-btn" id="openHistoryBtn" type="button"><i class="bi bi-clock-history me-2"></i>History</button>
        </div>
      </header>

      <section class="content-grid">
        <div class="work-area">
